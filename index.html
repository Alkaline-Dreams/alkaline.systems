<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkaline Systems</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body onclick="handleClick()">
    <main>
        <div class="container">
            <p class="message">
                Looking awfully quiet around here...<br />
                Surely something will happen soon...
            </p>
            <p id="quit-prying" class="hidden">
                Still nothing ¯\_(ツ)_/¯
            </p>
        </div>
    </main>
    <script>
        let clickCount = 0;
        function handleClick() {
            clickCount += 1;
            if (clickCount >= 10) {
                document.getElementById('quit-prying').classList.add('visible');
            }
        }
    </script>
</body>
</html>
